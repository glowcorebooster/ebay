<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>CJ US Products — IncomeEdge Tool</title>
<style>
  :root{
    --bg:#0B1220;
    --panel:#121B2E;
    --panel-2:#0F1A2E;
    --border:#27344A;
    --text:#E9EEF6;
    --muted:#8C9AB3;
    --red:#DC2626;
    --red-dim:#7F1D1D;
    --blue:#2563EB;
    --green:#16A34A;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:var(--sans); -webkit-font-smoothing:antialiased;
    padding-bottom:60px;
  }
  header{
    position:sticky; top:0; z-index:20;
    background:linear-gradient(180deg, var(--bg) 70%, transparent);
    backdrop-filter:blur(6px);
    padding:14px 16px 10px;
    border-bottom:1px solid var(--border);
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .flagbar{display:flex; width:22px; height:16px; border-radius:3px; overflow:hidden; flex-shrink:0;
    background:repeating-linear-gradient(180deg,#B22234 0 2px,#fff 2px 4px); box-shadow:0 0 0 1px var(--border);}
  h1{font-size:16px; margin:0; letter-spacing:.2px;}
  .sub{font-size:12px; color:var(--muted); margin-top:2px;}

  .card{
    background:var(--panel); border:1px solid var(--border); border-radius:12px;
    padding:14px; margin:12px 16px;
  }
  .row{display:flex; flex-wrap:wrap; gap:10px;}
  label{display:block; font-size:11px; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:.5px;}
  input[type=text], input[type=password], select{
    width:100%; background:var(--panel-2); border:1px solid var(--border); color:var(--text);
    padding:10px 11px; border-radius:8px; font-size:14px; font-family:var(--mono);
  }
  input::placeholder{color:#5B6B85;}
  .field{flex:1 1 160px;}
  .checkrow{display:flex; align-items:center; gap:7px; font-size:13px; color:var(--text); margin-top:4px;}
  .checkrow input{width:16px; height:16px;}

  button{
    border:none; cursor:pointer; font-family:var(--sans); font-weight:600;
    padding:11px 16px; border-radius:8px; font-size:14px;
  }
  .btn-primary{background:var(--red); color:#fff;}
  .btn-primary:disabled{background:#4a2424; color:#9a7a7a; cursor:not-allowed;}
  .btn-secondary{background:var(--panel-2); color:var(--text); border:1px solid var(--border);}
  .btn-ghost{background:transparent; color:var(--blue); padding:6px 4px; font-size:13px;}

  .status{font-size:12.5px; margin-top:10px; padding:8px 10px; border-radius:8px; display:none;}
  .status.show{display:block;}
  .status.ok{background:rgba(22,163,74,.12); color:#4ADE80; border:1px solid rgba(22,163,74,.3);}
  .status.err{background:rgba(220,38,38,.12); color:#FCA5A5; border:1px solid rgba(220,38,38,.3);}
  .status.info{background:rgba(37,99,235,.12); color:#93C5FD; border:1px solid rgba(37,99,235,.3);}

  details{margin:12px 16px;}
  summary{cursor:pointer; font-size:13px; color:var(--muted); padding:4px 0;}

  #filters{display:none;}
  #resultsBar{display:none; padding:0 16px; font-size:12.5px; color:var(--muted); display:flex; justify-content:space-between; align-items:center; margin-top:4px;}

  .grid{
    display:grid; grid-template-columns:repeat(2, 1fr); gap:10px; padding:10px 16px;
  }
  @media(min-width:640px){ .grid{grid-template-columns:repeat(3,1fr);} }
  @media(min-width:960px){ .grid{grid-template-columns:repeat(5,1fr);} }

  .pcard{
    background:var(--panel); border:1px solid var(--border); border-radius:10px; overflow:hidden;
    display:flex; flex-direction:column;
  }
  .pcard img{width:100%; aspect-ratio:1/1; object-fit:cover; background:#1a2438; display:block;}
  .pbody{padding:8px 9px 10px;}
  .pname{font-size:12.5px; line-height:1.3; height:32px; overflow:hidden; margin-bottom:6px;}
  .pmeta{display:flex; justify-content:space-between; align-items:center;}
  .price{font-family:var(--mono); font-weight:700; font-size:14px; color:#fff;}
  .badge{
    font-size:9.5px; font-weight:700; color:#fff; background:var(--blue);
    padding:2px 5px; border-radius:4px; display:inline-flex; align-items:center; gap:3px;
  }
  .ushow{display:flex; align-items:center; gap:4px; font-size:10px; color:var(--muted); margin-top:5px;}
  .pfoot{display:flex; gap:6px; margin-top:8px;}
  .pfoot a{flex:1; text-align:center; font-size:11.5px; padding:6px; border-radius:6px; background:var(--panel-2); color:var(--text); text-decoration:none; border:1px solid var(--border);}
  .sku{font-family:var(--mono); font-size:9.5px; color:var(--muted); margin-top:4px; word-break:break-all;}

  .pagebar{display:flex; justify-content:center; align-items:center; gap:12px; padding:14px 16px; font-size:13px;}
  .empty{padding:30px 16px; text-align:center; color:var(--muted); font-size:13.5px;}
  .spinner{border:2px solid var(--border); border-top-color:var(--red); border-radius:50%; width:16px; height:16px; animation:spin .7s linear infinite; display:inline-block; vertical-align:-3px; margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="flagbar"></div>
    <div>
      <h1>CJ US Products</h1>
      <div class="sub">IncomeEdge sourcing tool — shows only products with U.S. warehouse stock</div>
    </div>
  </div>
</header>

<div class="card" id="connectCard">
  <div class="row">
    <div class="field">
      <label>CJ API Key</label>
      <input type="password" id="apiKey" placeholder="from CJ dashboard → My CJ → API Key">
    </div>
  </div>
  <details>
    <summary>Advanced — CORS proxy URL (only needed if direct connect fails)</summary>
    <div class="field" style="margin-top:8px;">
      <input type="text" id="proxyUrl" placeholder="e.g. https://your-worker.workers.dev (leave blank to try direct)">
    </div>
  </details>
  <div class="row" style="margin-top:10px;">
    <button class="btn-primary" id="connectBtn" style="flex:1;">Connect</button>
  </div>
  <div class="status" id="connectStatus"></div>
</div>

<div class="card" id="filters">
  <div class="row">
    <div class="field" style="flex:2 1 200px;">
      <label>Keyword</label>
      <input type="text" id="keyword" placeholder="e.g. led lamp, phone case">
    </div>
    <div class="field">
      <label>Sort by</label>
      <select id="orderBy">
        <option value="0">Best match</option>
        <option value="2">Price</option>
        <option value="3">Newest</option>
        <option value="4">Inventory</option>
        <option value="1">Listing count</option>
      </select>
    </div>
    <div class="field">
      <label>Direction</label>
      <select id="sortDir">
        <option value="desc">High → Low</option>
        <option value="asc">Low → High</option>
      </select>
    </div>
  </div>
  <div class="row" style="margin-top:6px;">
    <label class="checkrow"><input type="checkbox" id="freeShipOnly"> Free shipping only</label>
    <label class="checkrow"><input type="checkbox" id="inStockOnly" checked> In stock only</label>
  </div>
  <div class="row" style="margin-top:10px;">
    <button class="btn-primary" id="searchBtn" style="flex:1;">Load U.S. Products</button>
  </div>
  <div class="status" id="searchStatus"></div>
</div>

<div id="resultsBar">
  <span id="resultsCount"></span>
  <button class="btn-ghost" id="disconnectBtn">Switch account</button>
</div>

<div class="grid" id="grid"></div>
<div class="pagebar" id="pagebar"></div>

<script>
(function(){
  const CJ_BASE = 'https://developers.cjdropshipping.com';

  const state = {
    apiKey:'', proxyUrl:'', accessToken:'', tokenExpiry:null,
    page:1, size:24, totalPages:1, totalRecords:0
  };

  const $ = id => document.getElementById(id);

  function setStatus(el, type, msg, busy){
    el.className = 'status show ' + type;
    el.innerHTML = (busy ? '<span class="spinner"></span>' : '') + msg;
  }
  function clearStatus(el){ el.className = 'status'; el.innerHTML=''; }

  function targetUrl(path){
    if (state.proxyUrl) {
      const base = state.proxyUrl.replace(/\/$/,'');
      return base + path;
    }
    return CJ_BASE + path;
  }

  async function cjFetch(path, opts){
    opts = opts || {};
    const headers = Object.assign({'Content-Type':'application/json'}, opts.headers||{});
    let res;
    try{
      res = await fetch(targetUrl(path), Object.assign({}, opts, {headers}));
    }catch(e){
      throw new Error('NETWORK_BLOCKED');
    }
    let json;
    try{ json = await res.json(); }
    catch(e){ throw new Error('Bad response from server (not JSON). Status '+res.status); }
    if (json.code !== 200 || json.result === false){
      throw new Error(json.message || ('API error '+json.code));
    }
    return json.data;
  }

  async function connect(){
    const apiKey = $('apiKey').value.trim();
    state.proxyUrl = $('proxyUrl').value.trim();
    if (!apiKey){ setStatus($('connectStatus'),'err','Paste your CJ API Key first.'); return; }
    state.apiKey = apiKey;
    $('connectBtn').disabled = true;
    setStatus($('connectStatus'),'info','Connecting to CJ...',true);
    try{
      const data = await cjFetch('/api2.0/v1/authentication/getAccessToken', {
        method:'POST',
        body: JSON.stringify({apiKey})
      });
      state.accessToken = data.accessToken;
      state.tokenExpiry = data.accessTokenExpiryDate;
      setStatus($('connectStatus'),'ok','Connected ✓ Token valid until '+ (state.tokenExpiry||'—'));
      $('filters').style.display = 'block';
      $('resultsBar').style.display = 'flex';
      loadProducts();
    }catch(e){
      if (e.message === 'NETWORK_BLOCKED'){
        setStatus($('connectStatus'),'err',
          'Direct connection was blocked (likely CORS — CJ\'s API doesn\'t allow browser calls). '+
          'Deploy a small Cloudflare Worker proxy and paste its URL under "Advanced" above, then try again.');
      } else {
        setStatus($('connectStatus'),'err','Connect failed: '+e.message);
      }
    }finally{
      $('connectBtn').disabled = false;
    }
  }

  async function loadProducts(){
    if (!state.accessToken){ return; }
    const btn = $('searchBtn');
    btn.disabled = true;
    setStatus($('searchStatus'),'info','Loading U.S. warehouse products...',true);
    $('grid').innerHTML = '';

    const params = new URLSearchParams();
    params.set('page', state.page);
    params.set('size', state.size);
    params.set('countryCode', 'US');           // <-- US-only filter, no CN
    params.set('isWarehouse', 'true');
    params.set('orderBy', $('orderBy').value);
    params.set('sort', $('sortDir').value);
    const kw = $('keyword').value.trim();
    if (kw) params.set('keyWord', kw);
    if ($('freeShipOnly').checked) params.set('addMarkStatus','1');
    if ($('inStockOnly').checked) params.set('startWarehouseInventory','1');

    try{
      const data = await cjFetch('/api2.0/v1/product/listV2?'+params.toString(), {
        method:'GET',
        headers:{ 'CJ-Access-Token': state.accessToken }
      });
      state.totalPages = data.totalPages || 1;
      state.totalRecords = data.totalRecords || 0;
      const products = (data.content||[]).flatMap(c => c.productList||[]);
      renderGrid(products);
      renderPager();
      $('resultsCount').textContent = state.totalRecords.toLocaleString() + ' U.S.-stocked products • page '+state.page+' of '+state.totalPages;
      clearStatus($('searchStatus'));
    }catch(e){
      if (e.message === 'NETWORK_BLOCKED'){
        setStatus($('searchStatus'),'err','Connection blocked — set up the CORS proxy (see Advanced section) and reconnect.');
      } else {
        setStatus($('searchStatus'),'err','Search failed: '+e.message);
      }
    }finally{
      btn.disabled = false;
    }
  }

  function esc(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function renderGrid(products){
    const grid = $('grid');
    if (!products.length){
      grid.innerHTML = '<div class="empty" style="grid-column:1/-1;">No U.S.-stocked products matched. Try a different keyword or turn off "In stock only".</div>';
      return;
    }
    grid.innerHTML = products.map(p => {
      const price = p.discountPrice || p.nowPrice || p.sellPrice || '—';
      const free = p.addMarkStatus === 1;
      return `<div class="pcard">
        <img loading="lazy" src="${esc(p.bigImage)}" alt="${esc(p.nameEn)}" onerror="this.style.opacity=0.2">
        <div class="pbody">
          <div class="pname">${esc(p.nameEn)}</div>
          <div class="pmeta">
            <span class="price">$${price}</span>
            ${free ? '<span class="badge">FREE SHIP</span>' : ''}
          </div>
          <div class="ushow">🇺🇸 US warehouse · ${p.warehouseInventoryNum||0} in stock</div>
          <div class="sku">${esc(p.sku||'')}</div>
          <div class="pfoot">
            <a href="https://cjdropshipping.com/product/${esc(p.id)}.html" target="_blank" rel="noopener">View on CJ</a>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function renderPager(){
    const bar = $('pagebar');
    bar.innerHTML = '';
    if (state.totalPages <= 1) return;
    const prev = document.createElement('button');
    prev.className='btn-secondary'; prev.textContent='← Prev';
    prev.disabled = state.page <= 1;
    prev.onclick = () => { state.page--; loadProducts(); window.scrollTo({top:0,behavior:'smooth'}); };

    const label = document.createElement('span');
    label.style.color='var(--muted)'; label.style.fontSize='13px';
    label.textContent = state.page + ' / ' + state.totalPages;

    const next = document.createElement('button');
    next.className='btn-secondary'; next.textContent='Next →';
    next.disabled = state.page >= state.totalPages;
    next.onclick = () => { state.page++; loadProducts(); window.scrollTo({top:0,behavior:'smooth'}); };

    bar.appendChild(prev); bar.appendChild(label); bar.appendChild(next);
  }

  $('connectBtn').addEventListener('click', connect);
  $('searchBtn').addEventListener('click', () => { state.page = 1; loadProducts(); });
  $('disconnectBtn').addEventListener('click', () => {
    state.accessToken=''; $('filters').style.display='none'; $('resultsBar').style.display='none';
    $('grid').innerHTML=''; $('pagebar').innerHTML=''; clearStatus($('connectStatus'));
  });
})();
</script>
</body>
</html>
